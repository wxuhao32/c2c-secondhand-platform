services:
  - type: web
    name: resale-platform-backend
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Xmx512m -jar target/platform-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        generateValue: true

  - type: web
    name: resale-platform-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_BASE_URL
        value: https://resale-platform-backend.onrender.com/api
