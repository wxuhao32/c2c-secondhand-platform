spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:resale_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    hikari:
      maximum-pool-size: 25
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
      pool-name: ResaleMySQLPool
      auto-commit: true
      read-only: false
      pool-name: ResaleMySQLPool
      auto-commit: true
      read-only: false

  h2:
    console:
      enabled: false
      mode: never
      mode: never

  data:
      enabled: true
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms
        shutdown-timeout: 200ms
      enabled: true
      host: ${REDIS_HOST:localhost}
  port: ${PORT:${SERVER_PORT:10000}}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
      max: 300
      min-spare: 20
    max-connections: 10000
    accept-count: 200
        shutdown-timeout: 200ms

server:
  port: ${PORT:${SERVER_PORT:10000}}
  servlet:
    context-path: /api
  tomcat:
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

