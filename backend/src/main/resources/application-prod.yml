# 生产环境配置（Render 部署用）
spring:
  # 数据源配置 - H2 文件模式（数据持久化）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:/data/resale_platform;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ${H2_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # 关闭 H2 控制台（生产环境）
  h2:
    console:
      enabled: false

  # 数据库初始化（仅首次启动时执行）
  sql:
    init:
      mode: never  # 生产环境不自动执行 schema.sql/data.sql

  # 禁用 Redis
  data:
    redis:
      enabled: false

# 服务器配置
server:
  port: ${SERVER_PORT:10000}
  servlet:
    context-path: /api

# 日志配置
logging:
  level:
    root: INFO
    com.resale.platform: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
